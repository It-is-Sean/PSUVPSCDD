project:
  name: "PSUVPSC3DD-shared-complete-3d-decoding"
  mode: "full-auto"

research:
  topic: >-
    Continue the PSUVPSC3DD proposal: probing whether frozen visual foundation
    representations, starting with VGGT, can be decoded through a shared frozen
    NOVA3R-style complete-3D decoder into stable scene-level complete/amodal
    3D structure inside sparse input-view frusta. Use the existing repository
    /home/jcd/PSUVPSC3DD_repo as the source of truth. Prioritize robust
    visual-first evaluation, fixed-sample metrics, and proposal-aligned adapter
    designs (cross-attention/query-conditioned adapters, token distillation, or
    pseudo-GT baselines) rather than single-scalar Chamfer chasing.
  domains:
    - "machine-learning"
    - "computer-vision"
    - "3d-reconstruction"
  daily_paper_count: 5
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 2
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "experiments/probe3d/result/researchclaw/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "openai-compatible"
  base_url: "http://127.0.0.1:18901/v1"
  wire_api: "responses"
  api_key_env: "RESEARCHCLAW_PROXY_API_KEY"
  api_key: ""
  primary_model: "gpt-5.5"
  fallback_models:
    - "gpt-5.4"
  timeout_sec: 600

security:
  hitl_required_stages: []
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 1800
  max_iterations: 4
  metric_key: "robust_fscore_tau_0.05"
  metric_direction: "maximize"
  sandbox:
    python_path: "/data1/jcd_data/miniconda3/envs/nova3r/bin/python"
    gpu_required: true
    max_memory_mb: 65536
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 65536
    network_policy: "setup_only"
    auto_install_deps: true
    shm_size_mb: 8192
    keep_containers: false
  opencode:
    enabled: true
    auto: true
    complexity_threshold: 0.2
    model: ""
    timeout_sec: 900
    max_retries: 1
    workspace_cleanup: true
  figure_agent:
    enabled: false

prompts:
  custom_file: "researchclaw/prompts.psuvpsc3dd.yaml"

metaclaw_bridge:
  enabled: false

trends:
  sources: ["arxiv"]
  max_papers_per_day: 5
