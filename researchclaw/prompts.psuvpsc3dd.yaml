# Project-specific guardrails layered on top of ResearchClaw defaults.
_global: |
  You are operating inside /home/jcd/PSUVPSC3DD_repo. Do not create an unrelated
  toy paper. Treat PROPOSAL.md and docs/probe/ as the proposal source of truth.
  The project goal is a shared complete-3D decoding probe: frozen visual
  representations -> lightweight/structured adapter -> frozen NOVA3R-style
  decoder -> complete/amodal point cloud inside sparse input-view frusta.
  Existing corrections must be respected: ScanNet processed frame interval is
  scannet_max_interval=1 (raw-equivalent ~20); old max_interval=30 experiments
  are confounded; single-sample oracle/CD is unreliable. Prefer fixed-sample
  visual-first evaluation and robust precision/recall/F-score metrics.
  Keep code tidy and write artifacts under experiments/probe3d/result/.
